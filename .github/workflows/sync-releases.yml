# .github/workflows/sync-releases.yml

name: Sync Fingerprint Chromium Releases

on:
  # schedule:
  #  - cron: '0 4 * * *'  # 每天 04:00 UTC 运行
  # 允许您在 Actions 页面手动触发此工作流
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      releases_json: ${{ steps.get_releases.outputs.releases_json }}
    steps:
      - name: Get releases to sync
        id: get_releases
        run: |
          SOURCE_RELEASES=$(curl -sL "https://api.github.com/repos/adryfish/fingerprint-chromium/releases")
          TARGET_TAGS=$(curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/tags" | jq -r '.[].name')

          # 创建一个需要同步的 releases 的 JSON 数组
          RELEASES_TO_SYNC=$(echo "$SOURCE_RELEASES" | jq -c --arg TARGET_TAGS "$TARGET_TAGS" '[.[] | select(.tag_name as $tag | ($TARGET_TAGS | split("\n") | index($tag)) | not) | {tag_name: .tag_name, name: .name, body: .body, prerelease: .prerelease, assets_url: .assets_url}]')
          
          echo "Releases to sync: $RELEASES_TO_SYNC"
          echo "releases_json=$RELEASES_TO_SYNC" >> $GITHUB_OUTPUT

  sync:
    needs: prepare
    if: needs.prepare.outputs.releases_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        release: ${{ fromJson(needs.prepare.outputs.releases_json) }}

    steps:
      - name: Download assets for ${{ matrix.release.tag_name }}
        run: |
          mkdir -p assets
          ASSETS_JSON=$(curl -sL "${{ matrix.release.assets_url }}")
          echo "$ASSETS_JSON" | jq -c '.[]' | while read asset; do
            ASSET_NAME=$(echo "$asset" | jq -r '.name')
            DOWNLOAD_URL=$(echo "$asset" | jq -r '.browser_download_url')
            echo "Downloading ${ASSET_NAME}..."
            curl -sLo "assets/${ASSET_NAME}" "${DOWNLOAD_URL}"
          done

      - name: Create Release and Upload Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ matrix.release.tag_name }}
          release_name: ${{ matrix.release.name }}
          body: ${{ matrix.release.body }}
          prerelease: ${{ matrix.release.prerelease }}
          file: assets/*
          file_glob: true
          overwrite: true
